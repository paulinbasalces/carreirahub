<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Curadoria | Ferramentas e Atalhos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="cabecalho-site">
        <div class="container nav-bar">
            <h1 class="logotipo" onclick="voltarParaHome()">Portal<span>Curadoria</span></h1>
            <nav>
                <a href="#" onclick="voltarParaHome()">Início</a>
            </nav>
        </div>
    </header>

    <main class="container" id="conteudo-principal">
        
        <div id="home-view">
            <section class="hero">
                <h2>Atalhos para a sua carreira</h2>
                <p>Conteúdo e ferramentas organizadas para quem busca ou já tem emprego.</p>
            </section>

            <div id="container-categorias"></div>
        </div>

        <div id="detalhes-view" class="hidden">
            <button class="btn-voltar" onclick="voltarParaHome()">← Voltar para o início</button>
            
            <article class="conteudo-artigo">
                <div class="artigo-header">
                    <span id="artigo-emoji" class="emoji-gigante"></span>
                    <div>
                        <span id="artigo-categoria" class="tag-categoria"></span>
                        <h2 id="artigo-titulo"></h2>
                    </div>
                </div>

                <div class="dor-box">
                    <strong>💡 Resolve o problema:</strong>
                    <p id="artigo-dor"></p>
                </div>

                <div class="artigo-corpo">
                    <h3>Sobre esta indicação</h3>
                    <p id="artigo-descricao"></p>
                </div>

                <div class="area-adsense ads-interna">
                    <p class="ads-label">Publicidade</p>
                </div>

                <div class="artigo-acao">
                    <a id="artigo-link" href="#" target="_blank" rel="noopener noreferrer" class="btn-primario">Acessar Plataforma Oficial</a>
                </div>
            </article>
        </div>

    </main>

    <footer class="rodape-site">
        <div class="container">
            <p>&copy; 2026 Portal Curadoria. Feito para o trabalhador moderno.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
