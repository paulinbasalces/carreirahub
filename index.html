<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Portal Carreira do Futuro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><div class="container nav-bar"><h1>Portal Carreira do Futuro</h1></div></header>
    <main class="container">
        <section class="hero">
            <h2>Escolha sua jornada</h2>
            <div class="busca-container"><form action="https://google.com/search" target="_blank"><input name="q" placeholder="Pesquisar..."><button>Buscar</button></form></div>
            <nav id="links-rapidos" class="bento-grid-container"></nav>
        </section>
        <div id="container-categorias-home"></div>
    </main>
    <div id="modal-overlay" class="modal-overlay hidden" onclick="fecharAoClicarFora(event)">
        <div id="modal-ferramenta" class="modal-content"><button class="btn-fechar" onclick="fecharTodosModais()">✕</button><h2 id="artigo-titulo"></h2><p id="artigo-dor"></p><p id="artigo-descricao"></p><a id="artigo-link" class="btn-primario" target="_blank">Acessar</a><a id="btn-reportar" class="btn-reportar">Reportar link quebrado</a></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
